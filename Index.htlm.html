<script>
function start(){
 document.getElementById("start").style.display="none";
 document.getElementById("scratchCard").style.display="flex";
}

let c=document.getElementById("canvas");
let ctx=c.getContext("2d");
ctx.fillStyle="#888";
ctx.fillRect(0,0,300,300);

let draw=false;
c.onmousedown=()=>draw=true;
c.onmouseup=()=>draw=false;
c.onmousemove=e=>{
 if(!draw) return;
 ctx.globalCompositeOperation="destination-out";
 ctx.beginPath();
 ctx.arc(e.offsetX,e.offsetY,20,0,Math.PI*2);
 ctx.fill();
 check();
}

function check(){
 let p=ctx.getImageData(0,0,300,300).data;
 let count=0;
 for(let i=0;i<p.length;i+=4){
  if(p[i+3]==0) count++;
 }
 if(count>p.length/8){
  document.getElementById("scratchCard").style.display="none";
  document.getElementById("reveal").style.display="flex";
  document.getElementById("music").play();
 }
}
</script>
